body:
  text: 西天譯經三藏朝散大夫試鴻臚少卿傳教大師臣法天奉詔譯復次曼拏羅內所用供獻之物須具二十件每日三時供獻辰時供物午時酉時不得再用須別換新者若誦者力所不及許納價直迴贖於第二時第三時再將供獻每日三時皆然直候得壇法所求成就日速納前件一切價直若供獻時即結幢印誦幢真言曰囉怛曩二合婆捺囉二合曩帝覩瑟也二合迦羅娑特嚩二合惹必里二合焰特嚩二合惹布惹迦娑嚩二合引賀復說衣物儀則以無蟲匹帛造白衣二對於衣上畫金彩莊嚴塔相作如是言我今獻衣物即以兩手大指各捻頭指屈如環兩環相鉤餘指磔開作衣物印復誦衣物真言七遍真言曰囉怛曩二合婆捺囉二合曩帝地里地里摩賀引三母捺覽二合麼囉馱娑嚩二合引賀復說扇儀則用無蟲匹帛作扇其扇白色制度合儀扇柄端直以金寶莊畫二柄作如是言我今獻扇即以左手屈小指於掌內竪臂搖手作扇印復誦扇真言七遍真言曰囉怛曩二合婆捺囉二合曩帝吠引覽婆嚩引喻馱引囉迦迦羅娑嚩二合賀復說拂儀則作白拂如法莊畫拂柄用拂真言加持七遍然後於東北方安置曩婆夜叉王北方安毘沙門西北方安摩賀曩婆次安阿嚕尼所二合大力夜叉王次安鉢捺摩護努護努迦及酥細拏贊捺嚩昝婆句謨吒迦囉訖哆𡁠麼摩護捺囉次安尾布羅左夜叉女此夜叉女最上端嚴次安尾布覽左贊捺隣二合引輸摩呬摩呬誐挽引左酥路引左曩引左鉢納摩二合娑囉引酥部嚕二合嚩尾左夜叉尼摩賀引麼曳酥枳細左嚩曩麼引羅引左必里二合引濕嚩二合梨捺嚕二合摩麼黎迦左薩里嚩二合迦引摩頗羅鉢羅二合那引及摩努引惹嚩引迦摩嚕閉酥嚕二合哆嚩引吉也二合酥㮈里舍二合儞摩護引誐囉二合引唧引帝尾契也二合哆引等二十或一百依次第安置於外方位因陀羅等賢聖前作金剛網輪槍杖螺羂索幢三股叉及於東門安戟金剛焰等如是可及百種已上以摩羅帝花摩梨迦花裛五色粉獻塗香燒沈香誦心真言請召寶藏神及諸賢聖誦本真言請召夜叉女次獻花鬘摩羅帝花殊妙蓮花優鉢羅花迦難麼花俱魯嚩花及緊輸迦花一切賢聖依次第獻以紫礦安悉香龍腦香白檀香同作護摩於寶藏賢聖前置種種花種種供養之物或聞大惡聲如得破壞此是祥瑞不得恐怖所求之事決定成就當得寶藏神與大富貴此則曼拏羅儀則及所誦真言唵引惹敢二合婆羅惹隣引捺羅二合引野娑嚩二合引賀阿地鉢帝摩賀引夜叉囉引惹地摩呬引擔努引夜叉鉢囉二合冒引捺夜夜叉娑引尾怛里二合引唵引夜乞叉二合娑嚩二合引賀次心真言阿南哆鉢捺摩二合引野娑嚩二合引賀夜乞叉二合尾儞也二合引野娑嚩二合引賀次蓮華藏真言阿喃哆商佉引野娑嚩二合賀次螺藏真言囉惹哆曩引婆野馱曩引地鉢哆曳引娑嚩二合引賀酥曩引婆引野馱曩引地鉢哆曳引娑嚩二合引賀摩尼曩引婆引野馱曩引地鉢哆曳引娑嚩二合引賀囉怛曩二合曩引婆引野馱曩引地鉢哆曳引娑嚩二合引賀酥曩婆野馱曩地鉢哆曳引娑嚩二合引賀暗沒曩引婆引野馱曩引地鉢哆曳引娑嚩二合引賀儞羅曩引婆引野馱曩地鉢哆曳引娑嚩二合引賀吠引室囉二合摩拏野馱曩地鉢哆曳引娑嚩二合引賀摩賀引曩引婆引野馱曩引地鉢哆曳引娑嚩二合引賀賀囉賀囉惹敢二合婆迦吽𠷑吒娑嚩二合引賀惹敢二合婆迦野羼捺囉二合引曳引娑嚩二合引賀護嚕護嚕喃引曩引酥史拏引野娑嚩二合引賀賀囉賀囉贊捺囉二合細引曩野娑嚩二合引賀惹敢二合婆曩引野娑嚩二合引賀摩護引捺囉引野娑嚩二合引賀尾摩羅尾摩羅捺里舍二合儞引娑嚩二合賀尾摩羅尾摩隷引尾舍引羅曩野儞引馱野娑嚩二合引賀贊捺覽二合引輸摩儞數布即以二合帝數布即以二合帝引贊捺里二合引贊捺囉二合摩帝娑嚩二合賀贊捺覽二合引輸摩帝娑嚩二合引賀阿嚩引賀儞酥路引左儞也鉢捺彌二合引娑嚩二合引賀鉢捺摩二合娑囉引酥部嚕二合摩努引囉彌引娑嚩二合引賀酥部嚕二合酥部嚕二合嚩引護鉢囉二合怛也二合曳引娑嚩二合引賀嚩呬尾二合摩隷波致謨引致娑嚩二合引賀摩賀引彌引佉酥吉引舍摩引隷酥吉引舍摩引隷吉引舍嚩囉尼娑嚩二合引賀曩嚩摩引隷儞娑嚩二合引賀引烏骨二合底瑟姹二合布室左二合隷引娑嚩二合引賀引捺嚕二合摩麼引隷迦引頗隷捺嚕二合摩枳隷枳隷娑嚩二合引賀迦摩摩隷尾羅細儞娑嚩二合賀薩里嚩二合誐囉二合賀引摩努引惹味引嚩誐嚩帝娑嚩二合引賀引迦引摩嚕閉婆引尾儞娑嚩二合引賀酥嚕二合哆嚩引吉也二合緊迦哩娑嚩二合引賀酥捺里舍二合儞引迦引彌儞娑嚩二合引賀摩護引誐里二合引婆野迦里娑嚩二合引賀印捺囉二合引野禰引嚩引地鉢哆曳引娑嚩二合引賀阿誐曩二合曳引賀尾也二合地鉢哆曳引娑嚩二合引賀夜摩引野必里二合引哆地鉢哆曳引娑嚩二合引賀此等真言能令一切天龍夜叉乾闥婆阿脩羅迦樓羅緊那羅摩睺羅伽必里哆毘舍左人非人等恭敬讚歎皆大歡喜又此真言利益一切眾生如如意寶如彼賢瓶如彼劫樹諸有所求皆得成就我今說此真言之法令彼持誦若彼不種善根眾生暫聞此法彼人永不墮於惡趣之難若有種善根者眾生之類樂聞書寫受持讀誦所得功德如佛如來功德無異若有人受持心真言者是人得入阿毘跋致不久當成阿耨多羅三藐三菩提永離惡道是人不貧不老無病無苦種種之事俱得圓滿復得一切有情愛樂尊重恭敬供養我今略說持此真言所獲功德假使一切賢聖及天龍夜叉乾闥婆阿脩羅迦樓羅緊那羅等不能知此功德之量說不能盡如是我等及彼諸佛如來應供正等正覺說此真言功德亦不能盡何況菩薩摩訶薩聲聞辟支佛及諸天人知此功德之量而說盡耶如來一切智智功德無邊此大力寶藏神所有功德亦復如是此真言王一切如來真實之心能為一切世間主宰救諸眾生惡心者調伏眾生苦惱者而能出生一切智慧若求寶藏神當於如來右邊畫神像白色手執拂子儀相圓滿神像右邊畫金剛手菩薩如青優鉢羅花色以真珠莊嚴儀相圓滿菩薩前畫夜叉大悲寶賢子如清水色身相圓滿面帶善顏手執毘惹布羅果藏著黃衣服大頭冠破損座垂左足如是誦人從頭至足一一觀察儀軌具足如是正觀經一洛叉時起心別作供養觀行想於水中所生諸花陸地諸花種種好香一切珍寶殊妙衣服及飲食燈鬘等而用供獻得一切願圓滿如是專心觀想已誦人復自白言我依三寶儀則信受奉行然後依天龍儀則作護摩法觀想寶賢大將執持火來著護摩爐內滿賢大將爐中燃火獲財大將作清淨法多聞大將鋪吉祥草座如來儀則觀想成就次想頭真言燃火口真言請召足真言作擁護求於成就即作護摩滿手擲三度誦真言曰阿誐曩二合曳引娑嚩二合引賀即結吉祥等印以二手作合掌中間安置賢聖觀想誦真言經須臾之間如風吹火觀想前所說乳汁作護摩一洛叉先獻八大明王作護摩一洛叉次獻寶賢大明王別作護摩一洛叉得大富貴二洛叉得子孫興盛三洛叉有大罪之者亦得成就之法如是儀則專心恒作次以水作護摩用花裛水以香水一千合作護摩獻寶藏神恒令得財恒獲快樂復作一千護摩得增長法依如是儀則如前觀想作護摩滿獻三合水家得增長若作護摩五洛叉能令㡧像隱身及令伏藏出現受用無盡獲最上快樂復作足真言口真言等令一切所求之事成就能禁怨家得過魔界永離深苦行住坐臥所受福德與天帝釋等其法如是
